eureka.client.service-url.defaultZone=http://eureka-server-global:8761/eureka/
spring.datasource.url=jdbc:mysql://mysqldb-global:3306/product_db?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.kafka.bootstrap-servers=kafka-global:9092

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak-global:8080/realms/ecommerce
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak-global:8080/realms/ecommerce/protocol/openid-connect/certs
internal.secret=mon-secret-interne

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=DEBUG
