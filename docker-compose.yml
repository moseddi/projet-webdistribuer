version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: mysqldb
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: db_commande
    ports:
      - "3306:3306"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

  eureka-server:
    image: eyaeyahermi/eureka-server:v1.0
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"

  config-service:
    image: eyaeyahermi/config-service:v1.0
    build: ./config-service
    container_name: config-service
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    environment:
      - eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

  commande-service:
    image: eyaeyahermi/commande-service:v1.0
    build: ./commande-service
    container_name: commande-service
    ports:
      - "8087:8087"
    depends_on:
      - config-service
      - eureka-server
      - mysqldb
      - keycloak
    environment:
      - spring.config.import=optional:configserver:http://config-service:8888
      - eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
      - spring.datasource.url=jdbc:mysql://mysqldb:3306/db_commande?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

  api-gateway:
    image: eyaeyahermi/api-gateway:v1.0
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8085:8085"
    depends_on:
      - config-service
      - eureka-server
    environment:
      - spring.config.import=optional:configserver:http://config-service:8888
      - eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
