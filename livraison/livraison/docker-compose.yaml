services:

  # ─────────────────────────────────────────
  # Infrastructure de base
  # ─────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    restart: always

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: host.docker.internal
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: always

  # ─────────────────────────────────────────
  # Spring Cloud Infrastructure
  # ─────────────────────────────────────────

  service-registry:
    image: mohamedseddikhafidh/service-registry:latest
    container_name: service-registry
    ports:
      - "8761:8761"
    restart: always

  config-server:
    image: mohamedseddikhafidh/config-server:latest
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - service-registry
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    restart: always

  api-gateway:
    image: mohamedseddikhafidh/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8089:8089"
    depends_on:
      - service-registry
      - config-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:6083/realms/ecommerce
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://host.docker.internal:6083/realms/ecommerce/protocol/openid-connect/certs
    restart: always

  # ─────────────────────────────────────────
  # Microservices métier existants
  # ─────────────────────────────────────────

  product-service:
    image: mohamedseddikhafidh/product-service:latest
    container_name: product-service
    depends_on:
      - service-registry
      - config-server
      - kafka
      - mysql
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:6083/realms/ecommerce
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://host.docker.internal:6083/realms/ecommerce/protocol/openid-connect/certs
    restart: always

  stock-service:
    image: mohamedseddikhafidh/stock-service:latest
    container_name: stock-service
    depends_on:
      - service-registry
      - config-server
      - kafka
      - mysql
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/stock_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:6083/realms/ecommerce
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://host.docker.internal:6083/realms/ecommerce/protocol/openid-connect/certs
    restart: always

  # ─────────────────────────────────────────
  # Nouveau : Livraison Service
  # ─────────────────────────────────────────

  livraison-service:
    image: mohamedseddikhafidh/livraison-service:latest
    container_name: livraison-service
    depends_on:
      - service-registry
      - config-server
      - mysql
    environment:
      # Eureka — enregistrement auprès du service registry
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/

      # Base de données dédiée livraison
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/livraison_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

      # Keycloak — JWT OAuth2 (tourne sur la machine hôte)
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:6083/realms/ecommerce
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://host.docker.internal:6083/realms/ecommerce/protocol/openid-connect/certs

      # Secret partagé avec l'API Gateway (GatewaySecretFilter)
      - INTERNAL_SECRET=mon-secret-interne

      # Message de bienvenue injecté via Config Server (@Value)
      - WELCOME_MESSAGE=Bienvenue sur le service de livraison !

    restart: always

volumes:
  mysql_data:
