# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8089

# ============================================
# APPLICATION NAME
# ============================================
spring.application.name=api-gateway

# ============================================
# EUREKA CLIENT CONFIGURATION
# ============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# ============================================
# GATEWAY DISCOVERY - DISABLED (use manual routes)
# ============================================
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ============================================
# ROUTES CONFIGURATION
# ============================================

internal.secret=my-super-secret-key

spring.cloud.gateway.routes[0].filters[0]=AddRequestHeader=X-Internal-Secret, ${internal.secret}
spring.cloud.gateway.routes[1].filters[0]=AddRequestHeader=X-Internal-Secret, ${internal.secret}
spring.cloud.gateway.routes[2].filters[0]=AddRequestHeader=X-Internal-Secret, ${internal.secret}
spring.cloud.gateway.routes[3].filters[0]=AddRequestHeader=X-Internal-Secret, ${internal.secret}
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/products/**

spring.cloud.gateway.routes[1].id=stock-service
spring.cloud.gateway.routes[1].uri=lb://stock-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/stocks/**

spring.cloud.gateway.routes[2].id=review-service
spring.cloud.gateway.routes[2].uri=lb://review-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/reviews/**

spring.cloud.gateway.routes[3].id=livraison-service
spring.cloud.gateway.routes[3].uri=lb://livraison-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/livraisons/**

# ============================================
# LOAD BALANCER CONFIGURATION
# ============================================
spring.cloud.loadbalancer.retry.enabled=true
spring.cloud.loadbalancer.health-check.refetch-instances-interval=10s
spring.cloud.loadbalancer.health-check.repeat-health-check-interval=5s

# ============================================
# ACTUATOR ENDPOINTS
# ============================================
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.loadbalancer=DEBUG
logging.level.org.springframework.security=DEBUG

# ============================================
# KEYCLOAK CONFIGURATION
# ============================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:6083/realms/ecommerce
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:6083/realms/ecommerce/protocol/openid-connect/certs