# ============================================
# LIVRAISON SERVICE - SHARED CONFIGURATION
# ============================================

# Welcome message
welcome.message=Welcome to Livraison Service from Config Server!

# Feature flags
livraison.service.tracking.enabled=true
livraison.service.notification.enabled=true

# Logging level
logging.level.tn.esprit.livraisonservice=INFO

# Actuator endpoints
management.endpoints.web.exposure.include=refresh,health,info

# Business configuration
livraison.service.max-delivery-days=7
livraison.service.default-carrier=DHL