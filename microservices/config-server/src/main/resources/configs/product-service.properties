# ============================================
# PRODUCT SERVICE - SHARED CONFIGURATION
# ============================================
# ONLY non-sensitive, environment-specific configs go here
# NO database passwords, NO server.port, NO server.address

# Welcome message (example of shared config)
welcome.message=Welcome to Product Service from Config Server!

# Feature flags (can change without rebuilding)
product.service.cache.enabled=true
product.service.batch.size=100
product.service.validation.enabled=true

# Logging level (can be overridden locally)
logging.level.tn.esprit.productservice=INFO

# Actuator endpoints
management.endpoints.web.exposure.include=refresh,health,info

# Business configuration
product.service.max-products-per-page=20
product.service.default-discount=0