# ============================================
# REVIEW SERVICE - SHARED CONFIGURATION
# ============================================

# Welcome message
welcome.message=Welcome to Review Service from Config Server!

# Feature flags
review.service.max-rating=5
review.service.min-rating=1
review.service.allow-multiple-reviews=false

# Logging level
logging.level.tn.esprit.reviewservice=INFO

# Actuator endpoints
management.endpoints.web.exposure.include=refresh,health,info

# Business configuration
review.service.max-comment-length=500
review.service.default-page-size=10