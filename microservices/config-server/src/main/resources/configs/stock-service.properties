# ============================================
# STOCK SERVICE - SHARED CONFIGURATION
# ============================================

# Welcome message
welcome.message=Welcome to Stock Service from Config Server!

# Stock business rules
stock.service.low-inventory-threshold=10
stock.service.critical-inventory-threshold=3
stock.service.batch-size=50
stock.service.auto-reorder.enabled=true

# Logging level
logging.level.tn.esprit.stockservice=INFO

# Actuator endpoints
management.endpoints.web.exposure.include=refresh,health,info

# Stock specific configs
stock.service.reservation-timeout-minutes=15
stock.service.max-reservation-per-user=5