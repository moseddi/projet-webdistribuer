# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8081

# ============================================
# APPLICATION NAME
# ============================================
spring.application.name=product-service

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/product_db?useUnicode=true&useJDBCCompliantTimezoneShift=true&createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# EUREKA CONFIGURATION - FIXED
# ============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ============================================
# LOGGING
# ============================================
logging.level.tn.esprit.productservice=DEBUG
logging.level.org.springframework.web=INFO

# ============================================
# COMPATIBILITY
# ============================================
spring.cloud.compatibility-verifier.enabled=false

# ============================================
# KAFKA CONFIGURATION
# ============================================
spring.kafka.bootstrap-servers=host.docker.internal:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.properties.max.block.ms=5000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.retries=3

# ============================================
# CONFIG SERVER
# ============================================
spring.config.import=optional:configserver:http://localhost:8888

# ============================================
# KEYCLOAK JWT VALIDATION
# ============================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:6083/realms/ecommerce



internal.secret=my-super-secret-key